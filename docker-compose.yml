name: Nexora

services:
  db:
    container_name: nexora_db
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: nexora
      MYSQL_USER: nexora_user
      MYSQL_PASSWORD: 1234
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - nexora_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p1234"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    container_name: nexora_laravel
    build: ./backend
    ports:
      - "8000:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/var/www/html
    networks:
      - nexora_network
    command: >
      bash -c "
      curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer &&
      composer install &&
      php artisan migrate:fresh --seed --force &&
      apache2-foreground
      "

  frontend:
    container_name: nexora_angular
    image: node:20
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
    working_dir: /app
    networks:
      - nexora_network
    command: >
      bash -c "npm install && npm start -- --host 0.0.0.0"

volumes:
  db_data:

networks:
  nexora_network:
    driver: bridge
