<div class="grid-retos">
  <div class="retos-col-left">
    <div class="card card-white retos-header-card">
      <div class="retos-tabs">
        <button class="reto-vista-tab active">
          <i class="bi bi-bullseye"></i> Reto actual
        </button>
        <button class="reto-vista-tab">
          <i class="bi bi-journal-text"></i> Historial
        </button>
        <button (click)="abrirModal()" class="btn-mas" style="margin-left:auto;">+ Nuevo reto</button>
      </div>
    </div>

    <div class="card card-white reto-card">
      <div class="reto-card-top">
        <div class="reto-card-icon">🚗</div>
        <div class="reto-card-info">
          <span class="reto-card-nombre">Comprar coche</span>
          <span class="reto-card-desc">Inicio: 01/01/2023 · Fin: 01/01/2026</span>
        </div>
        <span class="badge badge-activo"><i class="bi bi-check2-square"></i> Activo</span>
      </div>

      <div class="reto-card-meta-row">
        <div class="reto-card-meta-item">
          <span class="reto-card-meta-label">Cantidad (meta)</span>
          <span class="reto-card-meta-val ingreso-color">25.000,00 €</span>
        </div>
      </div>

      <div class="reto-bar-track" style="height:10px; margin-top: 10px;">
        <div class="reto-bar-fill" style="width:20%"></div>
      </div>

      <div style="margin-top:18px;display:flex;justify-content:flex-end;">
        <button class="btn-abandonar">Abandonar reto</button>
      </div>
    </div>
  </div>

  <div class="retos-col-right">
    <div class="card card-white">
      <p class="section-title">Resumen</p>
    </div>
  </div>
</div>

@if (mostrarPopup) {
<div class="modal-overlay">
  <div class="modal-box">

    <div class="modal-header">
      <h2 class="modal-title">Nuevo reto</h2>
      <button class="modal-close" (click)="cerrarModal()">✕</button>
    </div>

    <form [formGroup]="retoForm" (ngSubmit)="guardarReto()">
      <div class="modal-content-wrapper">

        <div class="modal-field">
          <label>¿Qué quieres lograr?</label>
          <input type="text" formControlName="titulo" placeholder="Ej: Viaje a Japón" class="modal-input">
        </div>

        <div class="modal-field">
          <label>Cantidad (€)</label>
          <input type="number" formControlName="cantidad" placeholder="0.00" class="modal-input">
        </div>
      </div>

  </div>

  <div class="modal-footer">
    <button type="button" class="btn-footer-cancel" (click)="cerrarModal()">Cancelar</button>
    <button type="submit" class="btn-footer-save" [disabled]="retoForm.invalid">
      Guardar
    </button>
  </div>
  </form>
</div>
</div>
}
