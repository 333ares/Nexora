@if (showHeader) {
<header class="header">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- BRAND -->
    <div class="header-brand">

        <!-- Icon / Logo -->
        <div class="brand-icon">
            <img src="https://i.postimg.cc/RFGT0P0K/Chat-GPT-Image-15-abr-2026-17-09-39.png" alt="Fincan.io logo"
                width="56" height="56" />
        </div>

        <!-- Text logo -->
        <div class="brand-text">
            <img src="https://i.postimg.cc/1tMKzWz4/Chat-GPT-Image-15-abr-2026-17-11-47.png" alt="Logo Nexora letras"
                class="logo2" />
        </div>

    </div>

    <!-- NAVIGATION -->
    <nav class="header-nav">
        <button class="nav-item" routerLink="/academia" routerLinkActive="active">
            Academia
        </button>

        <button class="nav-item" routerLink="/movimientos" routerLinkActive="active">
            Movimientos
        </button>

        <button class="nav-item" routerLink="/perfil" routerLinkActive="active">
            Perfil
        </button>
    </nav>

</header>
}

<!-- ROUTER CONTENT -->
<router-outlet></router-outlet>
