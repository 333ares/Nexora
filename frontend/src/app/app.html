@if (isLoggedIn) {
<header class="header">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <div class="header-brand">
        <div class="brand-icon">
            <img src="https://image2url.com/r2/default/images/1771516075234-2bd3afc6-5bfd-4499-902c-762ea9c1fe1d.png"
                alt="Fincan.io logo" width="56" height="56" />
        </div>
        <div class="brand-text">
            <img src="https://image2url.com/r2/default/images/1773067082329-3d49e8f6-224a-40ce-a605-7a951779f07c.png"
                alt="Logo Nexora letras" class="logo2" />
        </div>
    </div>

    <nav class="header-nav">
        <button class="nav-item" routerLink="/movimientos">Academia</button>
        <button class="nav-item" routerLink="/movimientos">Movimientos</button>
        <button class="nav-item" routerLink="/perfil">Perfil</button>
    </nav>

    <div class="header-right">
        <div class="search-bar">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.35-4.35" />
            </svg>
            <span class="search-placeholder">Buscar aquí</span>
        </div>
        <div class="header-dots">
            <span class="dot-menu"></span>
            <span class="dot-menu"></span>
            <span class="dot-menu"></span>
        </div>
        <div class="avatar">A</div>
    </div>
</header>
}
