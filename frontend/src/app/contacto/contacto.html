<div class="main-wrapper">
  <div class="contact-card">
    <div class="logo-container">
      <img src="https://i.postimg.cc/QxjpNn21/Logo_Nexora_pequeño.png" class="logo">
    </div>

    <h1>Formulario de contacto</h1>

    <form (submit)="onSubmit($event)">
      <div class="form-group">
        <label>Nombre completo</label>
        <input type="text" placeholder="Tu nombre y apellidos">
      </div>

      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" placeholder="nexora@example.com">
      </div>

      <div class="form-group">
        <label>Asunto</label>
        <input type="text" placeholder="Escribe un asunto">
      </div>

      <div class="form-group">
        <label>Mensaje</label>
        <textarea placeholder="Escribe el mensaje"></textarea>
      </div>

      <button type="submit" class="btn-submit">Enviar</button>
    </form>
  </div>
