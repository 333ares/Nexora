<div class="main-wrapper">
  <div class="contact-card">
    <div class="logo-container">
      <img src="assets/logo.png" alt="Nexora Logo" class="logo">
    </div>

    <h1>Formulario de contacto</h1>

    <form (submit)="onSubmit($event)">
      <div class="form-group">
        <label>Nombre completo</label>
        <input type="text" placeholder="Tu nombre y apellidos">
      </div>

      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" placeholder="nexora@example.com">
      </div>

      <div class="form-group">
        <label>Asunto</label>
        <input type="text" placeholder="Escribe un asunto">
      </div>

      <div class="form-group">
        <label>Mensaje</label>
        <textarea placeholder="Escribe el mensaje"></textarea>
      </div>

      <button type="submit" class="btn-submit">Acceder</button>
    </form>

    <div class="divider">
      <span>o</span>
    </div>

    <p class="footer-link">¿Aún no tienes cuenta? <a routerLink="/registro">Regístrate</a></p>
  </div>
</div>
